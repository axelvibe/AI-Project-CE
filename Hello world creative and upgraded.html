<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello, World.</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { height:100vh; overflow:hidden; background:#0a0a0f; color:#fff;
    font-family:'Helvetica Neue',Arial,sans-serif; cursor:crosshair;
    display:flex; align-items:center; justify-content:center; position:relative; }
  canvas { position:fixed; inset:0; z-index:1; }
  .stage { position:relative; z-index:2; text-align:center; pointer-events:none; }
  #hello { font-size:clamp(3rem, 12vw, 9rem); font-weight:200; letter-spacing:.02em;
    opacity:0; transform:translateY(40px); transition:all 2s cubic-bezier(.2,.8,.2,1); }
  #hello.in { opacity:1; transform:translateY(0); }
  #hello span { display:inline-block; transition:transform .3s ease, color .3s ease; }
  #sub { margin-top:20px; font-size:1rem; opacity:0; letter-spacing:.3em;
    text-transform:uppercase; transition:opacity 2s ease 1s; }
  #sub.in { opacity:.5; }
  #hint { position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    font-size:.75rem; opacity:0; letter-spacing:.2em; text-transform:uppercase;
    transition:opacity 2s ease 3s; z-index:3; }
  #hint.in { opacity:.35; }
  .glow { text-shadow:0 0 40px currentColor; }
</style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="stage">
    <h1 id="hello"></h1>
    <div id="sub">a world is waking up</div>
  </div>
  <div id="hint">move your cursor · click anything</div>

<script>
  // ============ STAR / PARTICLE FIELD ============
  const canvas = document.getElementById('bg'), ctx = canvas.getContext('2d');
  let W, H, stars = [], ripples = [], mouse = { x:-999, y:-999 };
  function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  resize(); addEventListener('resize', resize);

  // Build a starfield
  for (let i = 0; i < 220; i++) {
    stars.push({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.6 + .3,
      vx: (Math.random()-.5)*.15, vy: (Math.random()-.5)*.15,
      hue: 200 + Math.random()*80, twinkle: Math.random()*Math.PI*2
    });
  }

  addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  addEventListener('click', e => {
    ripples.push({ x:e.clientX, y:e.clientY, r:0, alpha:1, hue: 30 + Math.random()*330 });
    burst(e.clientX, e.clientY);
  });

  function burst(x, y) {
    for (let i = 0; i < 20; i++) {
      stars.push({
        x, y, r: Math.random()*2 + 1,
        vx: (Math.random()-.5)*6, vy: (Math.random()-.5)*6,
        hue: Math.random()*360, twinkle: 0, life: 60
      });
    }
  }

  function loop() {
    ctx.fillStyle = 'rgba(10,10,15,.15)';
    ctx.fillRect(0,0,W,H);

    // Stars
    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];
      s.x += s.vx; s.y += s.vy; s.twinkle += .05;

      // Gravity toward cursor
      const dx = mouse.x - s.x, dy = mouse.y - s.y, d = Math.hypot(dx, dy);
      if (d < 180 && d > 5) { s.vx += dx/d * .05; s.vy += dy/d * .05; }
      s.vx *= .98; s.vy *= .98;

      if (s.life !== undefined) { s.life--; if (s.life <= 0) { stars.splice(i,1); continue; } }
      if (s.x < 0) s.x = W; if (s.x > W) s.x = 0;
      if (s.y < 0) s.y = H; if (s.y > H) s.y = 0;

      const flicker = .6 + Math.sin(s.twinkle) * .4;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${s.hue}, 80%, 70%, ${flicker})`;
      ctx.shadowBlur = 8; ctx.shadowColor = `hsl(${s.hue}, 80%, 60%)`;
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Connect nearby stars with lines (constellation effect)
    for (let i = 0; i < stars.length; i++) {
      for (let j = i+1; j < stars.length; j++) {
        const a = stars[i], b = stars[j];
        const d = Math.hypot(a.x-b.x, a.y-b.y);
        if (d < 90) {
          ctx.strokeStyle = `hsla(220, 80%, 70%, ${(1 - d/90) * .15})`;
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        }
      }
    }

    // Click ripples
    for (let i = ripples.length - 1; i >= 0; i--) {
      const r = ripples[i];
      r.r += 4; r.alpha -= .015;
      if (r.alpha <= 0) { ripples.splice(i,1); continue; }
      ctx.strokeStyle = `hsla(${r.hue}, 90%, 65%, ${r.alpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2); ctx.stroke();
    }
    ctx.lineWidth = 1;

    requestAnimationFrame(loop);
  }
  loop();

  // ============ HELLO WORLD TYPEWRITER ============
  const text = "Hello, World.";
  const hello = document.getElementById('hello');
  text.split('').forEach((ch, i) => {
    const span = document.createElement('span');
    span.textContent = ch === ' ' ? '\u00A0' : ch;
    span.style.transitionDelay = (i * 0.06) + 's';
    hello.appendChild(span);
  });

  setTimeout(() => hello.classList.add('in'), 400);
  setTimeout(() => document.getElementById('sub').classList.add('in'), 600);
  setTimeout(() => document.getElementById('hint').classList.add('in'), 800);

  // Letters react to cursor
  const letters = hello.querySelectorAll('span');
  addEventListener('mousemove', e => {
    letters.forEach(l => {
      const r = l.getBoundingClientRect();
      const dx = e.clientX - (r.left + r.width/2);
      const dy = e.clientY - (r.top + r.height/2);
      const d = Math.hypot(dx, dy);
      if (d < 150) {
        const force = (1 - d/150) * 20;
        l.style.transform = `translate(${-dx/d * force}px, ${-dy/d * force}px) scale(${1 + (1-d/150)*.3})`;
        l.style.color = `hsl(${(d*3) % 360}, 90%, 70%)`;
        l.classList.add('glow');
      } else {
        l.style.transform = ''; l.style.color = ''; l.classList.remove('glow');
      }
    });
  });

  // ============ EASTER EGG: type your name ============
  let buf = '';
  addEventListener('keydown', e => {
    buf = (buf + e.key.toLowerCase()).slice(-4);
    if (buf === 'axel') {
      hello.innerHTML = '';
      "Hello, Axel.".split('').forEach((ch, i) => {
        const span = document.createElement('span');
        span.textContent = ch === ' ' ? '\u00A0' : ch;
        span.style.color = '#FFD166'; span.style.textShadow = '0 0 30px #FFD166';
        hello.appendChild(span);
      });
      document.getElementById('sub').textContent = 'the world was waiting for you';
      document.body.style.background = '#1F2A44';
      for (let i = 0; i < 100; i++) setTimeout(() => burst(Math.random()*W, Math.random()*H), i*30);
    }
  });
</script>
</body>
</html>
