<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclat Trend — Immigration Assistant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0e1a;--bg2:#111524;--card:#161b2e;--card2:#1c2238;--border:rgba(255,255,255,0.08);--t1:#e4eaf4;--t2:#7e8fa8;--t3:#44526a;--teal:#00c9a7;--teal2:#00a889;--teal-d:rgba(0,201,167,0.12);--indigo:#818cf8;--amber:#fbbf24;--red:#f87171}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);height:100vh;display:flex;justify-content:center;align-items:center}
.chat{width:100%;max-width:440px;height:100vh;max-height:800px;background:var(--card);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;overflow:hidden;position:relative;box-shadow:0 25px 60px rgba(0,0,0,0.5)}
@media(max-width:480px){.chat{max-height:none;height:100vh;border-radius:0;border:none}}
.header{background:linear-gradient(135deg,#0b0e1a 0%,#161b2e 100%);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--teal),#0097a7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;flex-shrink:0}
.header-info{flex:1;min-width:0}
.header-title{font-size:15px;font-weight:700;color:var(--t1)}
.header-sub{font-size:11px;color:var(--t2);margin-top:2px}
.header-status{display:flex;align-items:center;gap:5px;flex-shrink:0;font-size:11px;color:var(--teal)}
.header-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-track{background:transparent}
.msgs::-webkit-scrollbar-thumb{background:var(--t3);border-radius:2px}
.msg{display:flex;gap:8px;max-width:88%;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:4px}
.msg.bot .msg-avatar{background:var(--teal-d);color:var(--teal)}
.msg.user .msg-avatar{background:rgba(129,140,248,0.15);color:var(--indigo)}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;word-wrap:break-word}
.msg.bot .msg-bubble{background:var(--card2);color:var(--t1);border-bottom-left-radius:4px}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--teal),#0097a7);color:#072a22;border-bottom-right-radius:4px;font-weight:500}
.msg.bot .msg-bubble .highlight{color:var(--teal);font-weight:600}
.msg.bot .msg-bubble .label{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;margin:4px 2px}
.label-teal{background:var(--teal-d);color:var(--teal)}
.label-amber{background:rgba(251,191,36,0.12);color:var(--amber)}
.label-red{background:rgba(248,113,113,0.12);color:var(--red)}
.label-indigo{background:rgba(129,140,248,0.12);color:var(--indigo)}
.typing{padding:10px 14px;background:var(--card2);border-radius:14px;border-bottom-left-radius:4px;align-self:flex-start;display:flex;gap:4px;align-items:center;animation:fadeIn .3s ease}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:typing 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.input-area{border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0;background:var(--bg2)}
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:0;transition:min-height .2s}
.qr-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
.qr-btn:hover{background:var(--teal-d);border-color:var(--teal);color:var(--teal)}
.qr-btn:disabled{opacity:.4;cursor:not-allowed}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--t1);font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
.input-row input:focus{border-color:var(--teal)}
.input-row input::placeholder{color:var(--t3)}
.input-row input:disabled{opacity:.5}
.send-btn{width:42px;height:42px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--teal),#0097a7);color:#072a22;font-size:18px;cursor:pointer;transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.disclaimer{font-size:10px;color:var(--t3);text-align:center;padding:8px 16px;border-top:1px solid var(--border);background:var(--card);flex-shrink:0;line-height:1.4}
.status-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin:4px 0}
.status-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.status-label{color:var(--t2)}
.status-value{color:var(--t1);font-weight:500}
.progress-bar{height:4px;background:var(--bg);border-radius:2px;margin:8px 0;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .6s}
</style>
</head>
<body>
<div class="chat">
  <div class="header">
    <div class="header-icon">ET</div>
    <div class="header-info">
      <div class="header-title">Eclat Trend</div>
      <div class="header-sub">Immigration Assistant</div>
    </div>
    <div class="header-status">
      <span class="header-dot"></span>
      Online
    </div>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="input-area">
    <div class="quick-replies" id="qr"></div>
    <div class="input-row">
      <input type="text" id="input" placeholder="Type a message..." autocomplete="off">
      <button class="send-btn" id="send">➤</button>
    </div>
  </div>

  <div class="disclaimer">This assistant provides general information only and is not legal advice. Consult a qualified immigration attorney for personalized counsel.</div>
</div>

<script>
const M = document.getElementById('msgs');
const I = document.getElementById('input');
const S = document.getElementById('send');
const QR = document.getElementById('qr');

const demoCases = {
  'ECL-2024-001': {
    name: 'Chidi Okonkwo',
    type: 'Student Visa (UK)',
    submitted: '12 Jan 2025',
    status: 'Processing',
    stage: 'Visa Application Review',
    progress: 65,
    eta: '3–5 weeks',
    updates: [
      'Application received — 14 Jan 2025',
      'Documents verified — 28 Jan 2025',
      'Biometrics completed — 5 Feb 2025',
      'Under review by visa officer — 18 Feb 2025'
    ]
  },
  'ECL-2024-002': {
    name: 'Amina Bello',
    type: 'Work Visa (Canada)',
    submitted: '20 Oct 2024',
    status: 'Approved',
    stage: 'Visa Issued',
    progress: 100,
    eta: 'Passport ready for collection',
    updates: [
      'Application received — 22 Oct 2024',
      'Documents verified — 5 Nov 2024',
      'Employer verification complete — 20 Nov 2024',
      'Approved — 15 Dec 2024',
      'Visa stamped — 18 Dec 2024'
    ]
  },
  'ECL-2024-003': {
    name: 'Emeka Nwosu',
    type: 'Skilled Migration (Australia)',
    submitted: '3 Mar 2025',
    status: 'Additional Documents Required',
    stage: 'Document Review',
    progress: 40,
    eta: 'Awaiting your documents',
    updates: [
      'Application received — 5 Mar 2025',
      'Initial assessment complete — 20 Mar 2025',
      'Requested: updated bank statements & police clearance — 25 Mar 2025'
    ]
  },
  'ECL-2024-004': {
    name: 'Folake Adeyemi',
    type: 'Study Visa (Ireland)',
    submitted: '8 Feb 2025',
    status: 'Decision Pending',
    stage: 'Final Review',
    progress: 85,
    eta: '1–2 weeks',
    updates: [
      'Application received — 10 Feb 2025',
      'Documents verified — 22 Feb 2025',
      'Biometrics completed — 28 Feb 2025',
      'Under final review — 10 Mar 2025'
    ]
  }
};

let qrActive = false;

function addMsg(text, sender, extra) {
  const d = document.createElement('div');
  d.className = 'msg ' + sender;
  const a = document.createElement('div');
  a.className = 'msg-avatar';
  a.textContent = sender === 'bot' ? 'ET' : 'Y';
  const b = document.createElement('div');
  b.className = 'msg-bubble';
  b.innerHTML = text;
  d.appendChild(a);
  d.appendChild(b);
  if (extra) d.appendChild(extra);
  M.appendChild(d);
  M.scrollTop = M.scrollHeight;
}

function showTyping(cb) {
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  t.id = 'typing';
  M.appendChild(t);
  M.scrollTop = M.scrollHeight;
  setTimeout(() => { t.remove(); cb(); }, 800 + Math.random() * 600);
}

function setQuickReplies(btns) {
  QR.innerHTML = '';
  qrActive = false;
  if (!btns || btns.length === 0) return;
  qrActive = true;
  btns.forEach(label => {
    const b = document.createElement('button');
    b.className = 'qr-btn';
    b.textContent = label;
    b.onclick = () => { I.value = label; if (label.startsWith('ECL-')) { I.value = label; handleSend(); } else { handleSend(); } };
    QR.appendChild(b);
  });
}

function handleSend() {
  const text = I.value.trim();
  if (!text) return;
  I.value = '';
  addMsg(escapeHtml(text), 'user');
  setQuickReplies(null);
  I.disabled = true; S.disabled = true;
  processInput(text);
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function processInput(text) {
  const lower = text.toLowerCase();
  if (lower.startsWith('ecl-')) {
    showTyping(() => lookupCase(text.toUpperCase()));
  } else if (lower.includes('status') || lower.includes('track') || lower.includes('where is my case') || lower.includes('application progress')) {
    showTyping(() => botResp('askCaseId'));
  } else if (lower.includes('study') || lower.includes('student') || lower.includes('school') || lower.includes('university')) {
    showTyping(() => botResp('study'));
  } else if (lower.includes('work') || lower.includes('job') || lower.includes('employ') || lower.includes('career')) {
    showTyping(() => botResp('work'));
  } else if (lower.includes('relocate') || lower.includes('migrate') || lower.includes('move') || lower.includes('permanent') || lower.includes('pr') || lower.includes('residence')) {
    showTyping(() => botResp('relocate'));
  } else if (lower.includes('contact') || lower.includes('speak') || lower.includes('agent') || lower.includes('human') || lower.includes('person')) {
    showTyping(() => botResp('contact'));
  } else if (lower.includes('hello') || lower.includes('hi') || lower.includes('hey') || lower.includes('good')) {
    showTyping(() => botResp('greeting'));
  } else if (lower.includes('help') || lower.includes('menu') || lower.includes('option') || lower.includes('start')) {
    showTyping(() => botResp('menu'));
  } else if (lower.includes('thank')) {
    showTyping(() => botResp('thanks'));
  } else {
    showTyping(() => botResp('fallback'));
  }
}

function botResp(type) {
  I.disabled = false; S.disabled = false;
  switch(type) {
    case 'greeting':
      addMsg('Hello! Welcome to <span class="highlight">Eclat Trend</span>. I\'m your Immigration Assistant.<br><br>I can help you with:<br>• <strong>Check Application Status</strong> — See where your case stands<br>• <strong>Study Pathways</strong> — Student visas & school admissions<br>• <strong>Work Pathways</strong> — Work permits & skilled migration<br>• <strong>Relocation</strong> — Permanent residency & moving abroad<br>• <strong>Contact Support</strong> — Speak to a human consultant<br><br>How can I help you today?', 'bot');
      setQuickReplies(['Check Status', 'Study Pathways', 'Work Pathways', 'Relocation', 'Contact Support']);
      break;
    case 'menu':
      addMsg('Here\'s what I can help with:', 'bot');
      setQuickReplies(['Check Status', 'Study Pathways', 'Work Pathways', 'Relocation', 'Contact Support']);
      break;
    case 'askCaseId':
      addMsg('I\'d be happy to check your application status!<br><br>Please enter your <span class="highlight">Case ID</span> (e.g., <strong>ECL-2024-001</strong>) and I\'ll pull up your details instantly.', 'bot');
      setQuickReplies(['ECL-2024-001', 'ECL-2024-002', 'ECL-2024-003', 'ECL-2024-004']);
      break;
    case 'study':
      addMsg(`<span class="highlight">Study Pathways Abroad</span><br><br>We help students pursue education in:<br><br>
<span class="label label-teal">UK</span> <span class="label label-indigo">Canada</span> <span class="label label-amber">Ireland</span> <span class="label label-teal">Australia</span> <span class="label label-indigo">USA</span><br><br>
<strong>Our services include:</strong><br>
• University & course selection<br>
• Student visa application support<br>
• Document preparation & verification<br>
• Scholarship & financial aid guidance<br>
• Pre-departure orientation<br><br>
<strong>Popular programs:</strong> Undergraduate, Postgraduate, PhD, Short-term study<br><br>
Want to check a specific case or start a new application?`, 'bot');
      setQuickReplies(['Check Status', 'Work Pathways', 'Relocation', 'Contact Support']);
      break;
    case 'work':
      addMsg(`<span class="highlight">Work Pathways Abroad</span><br><br>We facilitate work visas and skilled migration to:<br><br>
<span class="label label-teal">Canada</span> <span class="label label-indigo">UK</span> <span class="label label-amber">Australia</span> <span class="label label-teal">Germany</span> <span class="label label-indigo">Ireland</span><br><br>
<strong>Our services include:</strong><br>
• Work permit & visa applications<br>
• Skilled migration (Express Entry, Skilled Worker)<br>
• Employer sponsorship matching<br>
• Labour market assessment support<br>
• Credential evaluation guidance<br><br>
<strong>Popular pathways:</strong> Tier 2, Express Entry, Global Talent, Critical Skills<br><br>
Would you like to check a status or explore options?`, 'bot');
      setQuickReplies(['Check Status', 'Study Pathways', 'Relocation', 'Contact Support']);
      break;
    case 'relocate':
      addMsg(`<span class="highlight">Relocation & Permanent Residency</span><br><br>We guide families and professionals through full relocation:<br><br>
<span class="label label-amber">Family Sponsorship</span> <span class="label label-teal">PR Applications</span> <span class="label label-indigo">Citizenship</span><br><br>
<strong>Our services include:</strong><br>
• Permanent residency applications<br>
• Family & dependent visas<br>
• Citizenship & naturalisation guidance<br>
• Pre-arrangement services (housing, schools, banking)<br>
• Settlement & integration support<br><br>
<strong>Top destinations:</strong> Canada, Australia, UK, Ireland, New Zealand<br><br>
Have a case ID or want to speak with a consultant?`, 'bot');
      setQuickReplies(['Check Status', 'Study Pathways', 'Work Pathways', 'Contact Support']);
      break;
    case 'contact':
      addMsg(`<span class="highlight">Contact Our Team</span><br><br>Our consultants are ready to help with your specific situation.<br><br>
📧 <strong>Email:</strong> <a href="mailto:support@eclattrend.com" style="color:var(--teal)">support@eclattrend.com</a><br>
📞 <strong>Phone:</strong> +234 800 ECLAT TREND<br>
🌐 <strong>Web:</strong> <a href="#" style="color:var(--teal)">eclattrend.com</a><br><br>
📍 <strong>Office:</strong> Lagos, Nigeria<br><br>
<em>Response time: within 2 hours during business hours</em><br><br>
Would you like to check a case status while you wait?`, 'bot');
      setQuickReplies(['Check Status', 'Back to Menu']);
      break;
    case 'thanks':
      addMsg('You\'re welcome! If you need anything else, just ask. I\'m here to help with your immigration journey. 🌍', 'bot');
      setQuickReplies(['Check Status', 'Back to Menu', 'Contact Support']);
      break;
    case 'fallback':
      addMsg('I\'m not sure I understood that. Let me help you with these options:', 'bot');
      setQuickReplies(['Check Status', 'Study Pathways', 'Work Pathways', 'Relocation', 'Contact Support', 'Back to Menu']);
      break;
  }
}

function lookupCase(id) {
  const c = demoCases[id];
  if (!c) {
    addMsg('I couldn\'t find a case with ID <strong>' + escapeHtml(id) + '</strong>. Please double-check your Case ID and try again.<br><br>Try one of these demo IDs: <strong>ECL-2024-001</strong> through <strong>ECL-2024-004</strong>.', 'bot');
    setQuickReplies(['ECL-2024-001', 'ECL-2024-002', 'ECL-2024-003', 'ECL-2024-004']);
    I.disabled = false; S.disabled = false;
    return;
  }

  const pct = c.progress;
  let color = '#fbbf24';
  if (pct >= 100) color = '#00c9a7';
  else if (pct >= 60) color = '#818cf8';
  else if (pct >= 30) color = '#fbbf24';
  else color = '#f87171';

  let statusBadge = `<span class="label label-amber">${c.status}</span>`;
  if (c.status === 'Approved') statusBadge = `<span class="label label-teal">Approved ✓</span>`;
  else if (c.status === 'Additional Documents Required') statusBadge = `<span class="label label-red">Action Needed</span>`;
  else if (c.status === 'Decision Pending') statusBadge = `<span class="label label-indigo">Pending</span>`;

  let updatesHtml = c.updates.map(u => `<div style="font-size:13px;color:var(--t2);padding:2px 0">• ${u}</div>`).join('');

  addMsg(`<span class="highlight">Case Found!</span>`, 'bot');

  const card = document.createElement('div');
  card.className = 'status-card';
  card.innerHTML = `
    <div style="font-size:15px;font-weight:600;color:var(--t1);margin-bottom:8px">${escapeHtml(c.name)}</div>
    <div class="status-row"><span class="status-label">Case ID</span><span class="status-value">${escapeHtml(id)}</span></div>
    <div class="status-row"><span class="status-label">Category</span><span class="status-value">${escapeHtml(c.type)}</span></div>
    <div class="status-row"><span class="status-label">Submitted</span><span class="status-value">${escapeHtml(c.submitted)}</span></div>
    <div class="status-row"><span class="status-label">Status</span><span class="status-value">${statusBadge}</span></div>
    <div class="status-row"><span class="status-label">Current Stage</span><span class="status-value">${escapeHtml(c.stage)}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="status-row"><span class="status-label">Progress</span><span class="status-value">${pct}%</span></div>
    <div class="status-row"><span class="status-label">Expected</span><span class="status-value">${escapeHtml(c.eta)}</span></div>
    <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
      <div style="font-size:12px;color:var(--t2);font-weight:500;margin-bottom:4px">Timeline</div>
      ${updatesHtml}
    </div>
  `;

  const d = document.createElement('div');
  d.className = 'msg bot';
  const a = document.createElement('div');
  a.className = 'msg-avatar';
  a.textContent = 'ET';
  d.appendChild(a);
  d.appendChild(card);
  M.appendChild(d);
  M.scrollTop = M.scrollHeight;

  addMsg('You can track your case anytime using this Case ID. For further assistance, feel free to contact our team!', 'bot');
  setQuickReplies(['Back to Menu', 'Contact Support']);
  I.disabled = false; S.disabled = false;
}

I.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
S.addEventListener('click', handleSend);

setTimeout(() => {
  addMsg('Welcome to <span class="highlight">Eclat Trend</span> Immigration Services. I\'m your dedicated assistant, here to help with every step of your journey abroad.', 'bot');
  setTimeout(() => {
    addMsg('🌍 <strong>Study • Work • Relocate</strong><br><br>I can check your application status instantly. Just drop your Case ID, or explore our pathways below.', 'bot');
    setQuickReplies(['Check Status', 'Study Pathways', 'Work Pathways', 'Relocation', 'Contact Support']);
  }, 600);
}, 400);
</script>
</body>
</html>
